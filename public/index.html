<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimProxy — Proxy Simulation Manager</title>
    <style>
      /* ═══════════════════════════════════════════════════════════
         DESIGN TOKENS
      ═══════════════════════════════════════════════════════════ */
      :root {
        --bg:          #0b0d12;
        --bg-alt:      #0f1117;
        --surface:     #141720;
        --surface-2:   #1a1e2b;
        --surface-3:   #20263a;
        --border:      #252b3b;
        --border-soft: #1e2435;

        --text:        #e2e8f4;
        --text-muted:  #6b7491;
        --text-dim:    #4a5270;

        --accent:      #00d4aa;
        --accent-dim:  rgba(0,212,170,.08);
        --accent-dark: #00b890;

        --green:       #22c55e;
        --green-bg:    rgba(34,197,94,.10);
        --red:         #f04f3a;
        --red-bg:      rgba(240,79,58,.10);
        --blue:        #3b82f6;
        --blue-bg:     rgba(59,130,246,.10);

        --font-sans: "Inter","Segoe UI",system-ui,-apple-system,sans-serif;
        --font-mono: "JetBrains Mono","Fira Code","Cascadia Code",Consolas,monospace;

        --radius-xs: 4px;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;

        --shadow-sm:   0 1px 2px rgba(0,0,0,.3);
        --shadow-glow: 0 0 20px rgba(0,212,170,.12);
        --bg-glow-a:   rgba(0,212,170,.06);
        --bg-glow-b:   rgba(59,130,246,.05);
        --terminal-log-bg: #0b0d12;

        --page-x: clamp(14px,3vw,28px);
        --page-y: 22px;

        /* ── Terminal CSS vars controlled by JS ── */
        --terminal-cols:   2;
        --terminal-height: 210px;

        /* ── Running Simulations table: 10 rows visible ──
           Each row ≈ 38px tall, thead ≈ 36px             */
        --sim-table-max-h: calc(10 * 38px + 37px); /* ≈ 417px */
      }

      /* ═══════════════════════════════════════════════════════════
         BASE RESET
      ═══════════════════════════════════════════════════════════ */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { color-scheme: dark; }
      :root[data-theme="light"] { color-scheme: light; }
      :root[data-theme="light"] {
        --bg:          #f3f6fb;
        --bg-alt:      #ffffff;
        --surface:     #fdfefe;
        --surface-2:   #f1f4fa;
        --surface-3:   #e8edf7;
        --border:      #ccd6e5;
        --border-soft: #dde5f2;

        --text:        #1f293b;
        --text-muted:  #4b5c79;
        --text-dim:    #697a9a;

        --accent:      #0ea57f;
        --accent-dim:  rgba(14,165,127,.1);
        --accent-dark: #0b8c6c;

        --green-bg:    rgba(34,197,94,.12);
        --red-bg:      rgba(240,79,58,.14);
        --blue-bg:     rgba(59,130,246,.13);
        --shadow-sm:   0 1px 2px rgba(15,23,42,.08);
        --shadow-glow: 0 0 16px rgba(14,165,127,.18);
        --bg-glow-a:   rgba(14,165,127,.14);
        --bg-glow-b:   rgba(59,130,246,.12);
        --terminal-log-bg: #0f172a;
      }

      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.5;
        color: var(--text);
        background-color: var(--bg);
        background-image:
          radial-gradient(ellipse 70% 40% at 0% 0%, var(--bg-glow-a) 0%, transparent 60%),
          radial-gradient(ellipse 50% 50% at 100% 100%, var(--bg-glow-b) 0%, transparent 60%);
        background-attachment: fixed;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ═══════════════════════════════════════════════════════════
         PAGE WRAPPER
         KEY FIX: display:block (not flex!) so panels don't
         compete for height. Each panel is naturally sized.
         The page itself scrolls via overflow-y:auto.
      ═══════════════════════════════════════════════════════════ */
      .page {
        width: 100%;
        height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
        padding: var(--page-y) var(--page-x) 62px;
        display: block; /* ← CRITICAL: block, not flex */
      }

      .page::-webkit-scrollbar { width: 5px; }
      .page::-webkit-scrollbar-track { background: transparent; }
      .page::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
      .page::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

      /* Stack panels with gap using margin */
      .panel { margin-top: 12px; }
      .topbar { margin-bottom: 4px; }

      /* ═══════════════════════════════════════════════════════════
         TOPBAR
      ═══════════════════════════════════════════════════════════ */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--border);
      }

      .brand { display: flex; align-items: center; gap: 10px; }

      .brand-icon {
        width: 34px; height: 34px;
        border-radius: var(--radius-md);
        background: linear-gradient(135deg,#00d4aa 0%,#3b82f6 100%);
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        box-shadow: var(--shadow-glow);
      }

      .brand-icon svg {
        width: 18px; height: 18px;
        fill: none; stroke: #fff;
        stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      }

      .brand-text h1 {
        font-size: 16px; font-weight: 700;
        letter-spacing: -.2px; color: var(--text); line-height: 1.2;
      }
      .brand-text p {
        font-size: 11px; color: var(--text-muted);
        font-family: var(--font-mono); line-height: 1; margin-top: 2px;
      }

      .topbar-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      .theme-toggle {
        width: 32px; height: 32px; padding: 0;
        border-radius: 999px;
        background: var(--surface-2);
        color: var(--text-muted);
      }
      .theme-toggle:hover { color: var(--text); border-color: var(--text-dim); }
      .theme-icon { font-size: 14px; line-height: 1; }
      .theme-icon-sun { display: none; }
      .theme-icon-moon { display: inline; }
      :root[data-theme="light"] .theme-icon-sun { display: inline; }
      :root[data-theme="light"] .theme-icon-moon { display: none; }

      .meta-chip {
        display: inline-flex; align-items: center; gap: 5px;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surface);
        font-size: 11px; font-family: var(--font-mono); color: var(--text-muted);
        white-space: nowrap;
      }

      .meta-chip .dot {
        width: 5px; height: 5px; border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 5px var(--green);
        animation: blink 2.4s infinite;
      }

      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

      /* ═══════════════════════════════════════════════════════════
         PANEL SHELL
         Each panel manages its own internal scroll.
         No height set here — panels are content-sized.
      ═══════════════════════════════════════════════════════════ */
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-sm);
        transition: border-color .2s;
      }
      .panel:hover { border-color: var(--surface-3); }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 11px 16px;
        background: var(--surface-2);
        border-bottom: 1px solid var(--border-soft);
        flex-wrap: wrap;
        /* Never shrink/grow — always fixed header height */
        flex-shrink: 0;
      }

      .panel-header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

      .panel-label { display: flex; align-items: center; gap: 8px; }

      .panel-label-icon {
        width: 26px; height: 26px;
        border-radius: var(--radius-sm);
        background: var(--accent-dim);
        border: 1px solid rgba(0,212,170,.15);
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .panel-label-icon svg {
        width: 13px; height: 13px;
        stroke: var(--accent); fill: none;
        stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      }

      .panel-header h3 { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: .1px; }

      /* ── Create / Terminal panels: padding inside body ── */
      .panel-body { padding: 16px; }
      .panel-body.is-collapsed { display: none; }

      /* ── Running Simulations panel: no body padding (table flush) ── */
      .panel-body-flush { padding: 0; }
      .panel-body-flush.is-collapsed { display: none; }

      /* ═══════════════════════════════════════════════════════════
         BUTTONS  (explicit, no broad :not() selectors)
      ═══════════════════════════════════════════════════════════ */
      button {
        display: inline-flex; align-items: center; justify-content: center; gap: 5px;
        cursor: pointer;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 7px 13px;
        font-size: 12px; font-weight: 500;
        font-family: var(--font-sans); line-height: 1.3;
        color: var(--text-muted);
        background: var(--surface-3);
        transition: background .15s, border-color .15s, box-shadow .15s, transform .1s, color .15s;
        white-space: nowrap; user-select: none;
        -webkit-tap-highlight-color: transparent; outline: none;
      }
      button:focus-visible { box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent); }
      button:active { transform: scale(.96); }

      /* Primary (Deploy / create) */
      .btn-primary {
        background: var(--accent); color: #041a15;
        font-weight: 600; border-color: var(--accent);
      }
      .btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); box-shadow: 0 0 14px rgba(0,212,170,.3); }
      :root:not([data-theme="light"]) .form-actions .btn-primary {
        background: #10b38f;
        border-color: #10b38f;
        color: #06231c;
      }
      :root:not([data-theme="light"]) .form-actions .btn-primary:hover {
        background: #0f9d7d;
        border-color: #0f9d7d;
        box-shadow: none;
      }

      /* Secondary (Suggest Port) */
      .btn-secondary { background: var(--surface-2); color: var(--text); border-color: var(--border); }
      .btn-secondary:hover { background: var(--surface-3); border-color: var(--text-dim); }

      /* Panel collapse toggle */
      button.panel-toggle {
        padding: 4px 10px; font-size: 11px;
        font-family: var(--font-mono);
        background: var(--surface-3); color: var(--text-muted);
        border-color: var(--border); border-radius: var(--radius-xs); min-width: 72px;
      }
      button.panel-toggle:hover { color: var(--text); border-color: var(--text-dim); }

      /* Table action buttons */
      button.copy  { background: var(--blue-bg);  color: #93c5fd; border-color: rgba(59,130,246,.25); }
      button.copy:hover  { background: rgba(59,130,246,.22); }
      button.warn  { background: var(--red-bg);   color: #fca5a5; border-color: rgba(240,79,58,.25); }
      button.warn:hover  { background: rgba(240,79,58,.22); }
      button.alt   { background: var(--surface-3); color: var(--text-muted); border-color: var(--border); }
      button.alt:hover   { color: var(--text); border-color: var(--text-dim); }

      /* Up button in table (accent green) */
      button.up-btn { background: rgba(0,212,170,.09); color: var(--accent); border-color: rgba(0,212,170,.22); }
      button.up-btn:hover { background: rgba(0,212,170,.16); }

      /* ── Terminal height controls ── */
      #terminalHeightDec,
      #terminalHeightInc {
        width: 26px; height: 26px;
        min-width: unset; padding: 0;
        border-radius: var(--radius-xs);
        font-size: 16px; line-height: 1;
        background: var(--surface-3);
        color: var(--text-muted);
        border: 1px solid var(--border);
      }
      #terminalHeightDec:hover,
      #terminalHeightInc:hover {
        background: var(--bg-alt, #0f1117);
        color: var(--accent);
        border-color: rgba(0,212,170,.35);
        transform: none; /* override active scale on hover */
      }

      /* ── Layout grid buttons ── */
      .layout-controls button {
        padding: 4px 11px; font-size: 11px;
        background: var(--surface-3); color: var(--text-muted);
        border-color: var(--border); font-family: var(--font-mono);
        min-width: unset;
      }
      .layout-controls button:hover { color: var(--text); border-color: var(--text-dim); }
      .layout-controls button.is-active {
        background: rgba(0,212,170,.12);
        color: var(--accent);
        border-color: rgba(0,212,170,.35);
      }

      /* ═══════════════════════════════════════════════════════════
         INPUTS / SELECT
      ═══════════════════════════════════════════════════════════ */
      input:not([type="checkbox"]):not([type="radio"]), select {
        width: 100%;
        background: var(--bg-alt, #0f1117);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 9px 12px;
        font-size: 13px; font-family: var(--font-sans);
        color: var(--text);
        transition: border-color .15s, box-shadow .15s, background .15s;
        outline: none; appearance: auto; color-scheme: dark;
      }
      input:not([type="checkbox"]):not([type="radio"]):focus, select:focus {
        border-color: var(--accent);
        background: #0d1118;
        box-shadow: 0 0 0 3px rgba(0,212,170,.12);
      }
      input::placeholder { color: var(--text-dim); }
      select option { background: #141720; }

      label {
        display: block;
        font-size: 10.5px; font-weight: 700;
        letter-spacing: .6px; text-transform: uppercase;
        color: var(--text-muted); margin-bottom: 6px;
      }

      /* ═══════════════════════════════════════════════════════════
         CREATE SIMULATION FORM GRID
         Content-sized — never collapses, never grows beyond content.
      ═══════════════════════════════════════════════════════════ */
      #simForm {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(9, minmax(0,1fr));
      }

      .field-name          { grid-column: 1/4;  grid-row: 1; }
      .field-simulate-url  { grid-column: 4/10; grid-row: 1; }
      .field-url-type      { grid-column: 1/2;  grid-row: 2; }
      .field-port          { grid-column: 2/3;  grid-row: 2; }
      .field-error-code    { grid-column: 3/4;  grid-row: 2; }
      .field-error-message { grid-column: 4/10; grid-row: 2; }
      .full                { grid-column: 1/-1; }

      .hint {
        font-size: 10.5px; color: var(--text-dim);
        font-family: var(--font-mono); margin-top: 5px;
      }

      .form-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      .form-actions .btn-secondary,
      .form-actions .btn-primary { padding: 9px 18px; font-size: 13px; min-width: 140px; }

      #formError {
        margin-top: 10px; min-height: 16px;
        font-size: 12px; font-family: var(--font-mono);
        color: var(--red, #f04f3a); padding: 0 2px;
      }

      /* ═══════════════════════════════════════════════════════════
         RUNNING SIMULATIONS TABLE
         KEY FIX: .sim-table-scroll has max-height for 10 rows
         and its own overflow-y:auto, so only the table scrolls.
         The panel itself stays fixed-height.
      ═══════════════════════════════════════════════════════════ */
      .sim-table-scroll {
        width: 100%;
        max-height: var(--sim-table-max-h); /* ~10 rows + header */
        overflow-y: auto;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .sim-table-scroll::-webkit-scrollbar { width: 5px; height: 4px; }
      .sim-table-scroll::-webkit-scrollbar-track { background: transparent; }
      .sim-table-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
      .sim-table-scroll::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

      table { width: 100%; min-width: 800px; border-collapse: collapse; font-size: 12.5px; }

      thead {
        position: sticky; top: 0; z-index: 2;
        background: var(--surface-2);
      }

      th {
        text-align: left; padding: 9px 12px;
        font-size: 10px; font-weight: 700;
        letter-spacing: .7px; text-transform: uppercase;
        color: var(--text-dim); border-bottom: 1px solid var(--border);
        white-space: nowrap; font-family: var(--font-mono);
      }

      tbody tr { border-bottom: 1px solid var(--border-soft); transition: background .12s; }
      tbody tr:last-child { border-bottom: none; }
      tbody tr:hover { background: rgba(255,255,255,.018); }

      td { padding: 9px 12px; vertical-align: middle; color: var(--text); font-size: 12.5px; }
      td.mono { font-family: var(--font-mono); font-size: 11.5px; color: var(--text-muted); }
      td.url-cell { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      td.actions { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
      td.actions button { padding: 4px 9px; font-size: 11px; min-width: unset; }

      /* ═══════════════════════════════════════════════════════════
         STATE BADGE
      ═══════════════════════════════════════════════════════════ */
      .state-badge {
        display: inline-flex; align-items: center; gap: 5px;
        padding: 3px 8px 3px 6px; border-radius: 999px;
        font-size: 10.5px; font-weight: 600;
        font-family: var(--font-mono); letter-spacing: .3px;
        white-space: nowrap; border: 1px solid transparent;
      }
      .state-badge .pip { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

      .state-up      { background: var(--green-bg); color: #4ade80; border-color: rgba(34,197,94,.2); }
      .state-up .pip { background: var(--green); box-shadow: 0 0 4px var(--green); }

      .state-down      { background: var(--red-bg); color: #fca5a5; border-color: rgba(240,79,58,.2); }
      .state-down .pip { background: var(--red); }

      .state-stopped      { background: rgba(255,255,255,.04); color: var(--text-dim); border-color: var(--border); }
      .state-stopped .pip { background: var(--text-dim); }

      .state-starting      { background: var(--blue-bg); color: #93c5fd; border-color: rgba(59,130,246,.2); }
      .state-starting .pip { background: var(--blue); animation: blink 1s infinite; }

      /* ═══════════════════════════════════════════════════════════
         SHOW TOGGLE (select-all checkbox in table header)
      ═══════════════════════════════════════════════════════════ */
      .show-toggle {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 10px; font-weight: 700; letter-spacing: .5px;
        text-transform: uppercase; color: var(--text-dim);
        font-family: var(--font-mono); white-space: nowrap; cursor: pointer;
      }
      .show-toggle input { width: 14px; height: 14px; cursor: pointer; accent-color: var(--accent); }

      /* ═══════════════════════════════════════════════════════════
         TERMINAL PANEL
         KEY FIX: no max-height / height on the panel or body —
         the terminal-grid grows to fit all cards naturally.
         Only the individual .terminal-body has a fixed height
         (controlled by --terminal-height via +/- buttons).
      ═══════════════════════════════════════════════════════════ */
      .terminal-toolbar {
        display: flex; align-items: center;
        justify-content: space-between;
        gap: 10px; flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .terminal-toolbar-left { display: inline-flex; align-items: center; gap: 12px; flex-wrap: wrap; }

      .terminal-size-controls {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 11px; font-family: var(--font-mono); color: var(--text-dim);
      }

      /* height label between the two buttons */
      .terminal-size-controls .height-label { user-select: none; }

      /* Current height readout */
      .terminal-height-val {
        font-family: var(--font-mono); font-size: 11px;
        color: var(--accent); min-width: 36px; text-align: center;
      }

      .layout-controls { display: inline-flex; align-items: center; gap: 4px; flex-wrap: wrap; }
      .layout-controls span {
        font-size: 10px; font-family: var(--font-mono); color: var(--text-dim);
        letter-spacing: .5px; text-transform: uppercase; margin-right: 3px;
      }

      /* Terminal card grid — expands to fit all cards, no cap */
      .terminal-grid {
        display: grid;
        grid-template-columns: repeat(var(--terminal-cols,2), minmax(0,1fr));
        gap: 10px;
      }

      .terminal-card {
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--bg);
        overflow: hidden;
        display: flex; flex-direction: column;
        transition: border-color .2s;
      }
      .terminal-card:hover { border-color: var(--surface-3); }

      /* macOS-style header bar */
      .terminal-head {
        padding: 8px 12px;
        background: var(--surface-2);
        border-bottom: 1px solid var(--border-soft);
        display: flex; align-items: center; justify-content: space-between;
        gap: 8px; flex-wrap: wrap;
        flex-shrink: 0; /* never squish header */
      }

      .terminal-title-wrap { display: flex; align-items: center; gap: 7px; min-width: 0; flex: 1; }

      .term-dots { display: flex; gap: 4px; flex-shrink: 0; }
      .term-dot  { width: 8px; height: 8px; border-radius: 50%; }
      .term-dot-r { background: #ff5f57; }
      .term-dot-y { background: #febc2e; }
      .term-dot-g { background: #28c840; }
      .terminal-stream-dot {
        width: 8px; height: 8px; border-radius: 50%;
        margin-left: 2px; flex-shrink: 0;
        border: 1px solid transparent;
      }
      .terminal-stream-dot.is-online {
        background: #22c55e;
        box-shadow: 0 0 0 1px rgba(34,197,94,.18), 0 0 8px rgba(34,197,94,.45);
      }
      .terminal-stream-dot.is-offline {
        background: #ef4444;
        box-shadow: 0 0 0 1px rgba(239,68,68,.2);
      }

      .terminal-title {
        font-family: var(--font-mono); font-size: 11px;
        color: var(--text-muted); overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap; min-width: 0;
      }

      .terminal-actions { display: inline-flex; align-items: center; gap: 4px; flex-shrink: 0; flex-wrap: wrap; }
      .terminal-actions button { padding: 3px 8px; font-size: 10.5px; min-width: unset; }

      .terminal-clear {
        padding: 3px 8px; font-size: 10.5px; min-width: unset;
        background: rgba(255,255,255,.04); color: var(--text-dim);
        border: 1px solid var(--border); border-radius: var(--radius-xs);
      }
      .terminal-clear:hover { background: rgba(255,255,255,.08); color: var(--text-muted); border-color: var(--text-dim); }

      .terminal-refresh {
        padding: 3px 6px; min-width: unset; line-height: 1;
        background: rgba(255,255,255,.04); color: var(--text-dim);
        border: 1px solid var(--border); border-radius: var(--radius-xs);
        display: inline-flex; align-items: center; justify-content: center;
      }
      .terminal-refresh:hover {
        background: rgba(0,212,170,.1); color: var(--accent);
        border-color: rgba(0,212,170,.35);
      }
      .terminal-refresh:active svg { animation: spin-once .35s linear; }
      @keyframes spin-once { to { transform: rotate(360deg); } }

      .terminal-actions .btn-down   { background: var(--red-bg);   color: #fca5a5; border: 1px solid rgba(240,79,58,.25); }
      .terminal-actions .btn-down:hover   { background: rgba(240,79,58,.22); }
      .terminal-actions .btn-up     { background: var(--green-bg); color: #86efac; border: 1px solid rgba(34,197,94,.25); }
      .terminal-actions .btn-up:hover     { background: rgba(34,197,94,.22); }
      .terminal-actions .btn-delete { background: rgba(255,255,255,.04); color: var(--text-dim); border: 1px solid var(--border); }
      .terminal-actions .btn-delete:hover { color: var(--text-muted); border-color: var(--text-dim); }
      .terminal-actions .btn-copy   { background: var(--blue-bg);  color: #93c5fd; border: 1px solid rgba(59,130,246,.25); }
      .terminal-actions .btn-copy:hover   { background: rgba(59,130,246,.22); }

      /* Individual terminal log window — height controlled by CSS var */
      .terminal-body {
        height: var(--terminal-height, 210px);
        overflow-y: auto; overflow-x: hidden;
        padding: 10px 14px;
        font-family: var(--font-mono); font-size: 11.5px; line-height: 1.7;
        color: #7a9e92; background: var(--terminal-log-bg);
        flex-shrink: 0; /* keep the defined height */
      }
      .terminal-body::-webkit-scrollbar { width: 4px; }
      .terminal-body::-webkit-scrollbar-track { background: transparent; }
      .terminal-body::-webkit-scrollbar-thumb { background: #2a3040; border-radius: 99px; }

      .line { white-space: pre-wrap; word-break: break-all; }
      .line-stdout { color: #7a9e92; }
      .line-stderr { color: #c97b3a; }
      .line-system { color: #4b6fa8; }

      .terminal-empty {
        color: var(--text-dim); font-size: 12px;
        font-family: var(--font-mono); padding: 6px 0;
        display: flex; align-items: center; gap: 8px;
      }
      .terminal-empty::before { content: "$"; color: var(--accent); font-weight: 700; }

      /* ═══════════════════════════════════════════════════════════
         FOOTER
      ═══════════════════════════════════════════════════════════ */
      .footer-note {
        position: fixed; left: 0; right: 0; bottom: 0;
        padding: 8px 16px;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        background: var(--surface); border-top: 1px solid var(--border);
        z-index: 50; font-size: 11px; font-family: var(--font-mono); color: var(--text-dim);
      }
      .footer-note a { color: var(--accent); text-decoration: none; font-weight: 600; transition: opacity .15s; }
      .footer-note a:hover { opacity: .75; }
      .footer-sep { color: var(--border); }

      /* ═══════════════════════════════════════════════════════════
         EMPTY STATE ROW
      ═══════════════════════════════════════════════════════════ */
      .empty-row td {
        text-align: center; color: var(--text-dim);
        font-size: 12px; font-family: var(--font-mono);
        padding: 28px 12px;
      }

      /* ═══════════════════════════════════════════════════════════
         RESPONSIVE — TABLET ≤ 900px
      ═══════════════════════════════════════════════════════════ */
      @media (max-width: 900px) {
        #simForm { grid-template-columns: repeat(4, minmax(0,1fr)); }
        .field-name          { grid-column: 1/3; grid-row: 1; }
        .field-simulate-url  { grid-column: 3/5; grid-row: 1; }
        .field-url-type      { grid-column: 1/2; grid-row: 2; }
        .field-port          { grid-column: 2/3; grid-row: 2; }
        .field-error-code    { grid-column: 3/4; grid-row: 2; }
        .field-error-message { grid-column: 4/5; grid-row: 2; }

        .terminal-grid { grid-template-columns: repeat(min(var(--terminal-cols,2),2), minmax(0,1fr)); }
        .layout-controls button[data-cols="4"] { display: none; }
      }

      /* ═══════════════════════════════════════════════════════════
         RESPONSIVE — MOBILE ≤ 600px
      ═══════════════════════════════════════════════════════════ */
      @media (max-width: 600px) {
        :root { --page-x: 12px; --page-y: 14px; }

        .topbar { padding-bottom: 12px; }
        .brand-text p { display: none; }
        .topbar-meta .meta-chip { display: none; }

        .panel-body, .panel-body-flush { padding: 12px; }
        .panel-body-flush { padding: 0; }

        #simForm { grid-template-columns: 1fr; }
        .field-name,.field-simulate-url,.field-url-type,
        .field-port,.field-error-code,.field-error-message { grid-column: 1; grid-row: unset; }

        .form-actions { flex-direction: column; }
        .form-actions .btn-secondary,
        .form-actions .btn-primary { width: 100%; min-width: unset; }

        .terminal-grid { grid-template-columns: 1fr !important; }
        .terminal-head { flex-direction: column; align-items: flex-start; }
        .terminal-title { white-space: normal; word-break: break-all; }
        .terminal-toolbar { flex-direction: column; align-items: flex-start; }
        .terminal-toolbar-left { flex-direction: column; align-items: flex-start; }

        .layout-controls button[data-cols="3"],
        .layout-controls button[data-cols="4"] { display: none; }

        button { min-height: 36px; }
        td.actions { flex-wrap: wrap; }
        td.actions button { flex: 1 1 auto; min-width: 50px; }
      }
    </style>
  </head>
  <body>
    <div class="page">

      <!-- ─── Topbar ──────────────────────────────────────────── -->
      <div class="topbar">
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          </div>
          <div class="brand-text">
            <h1>SimProxy</h1>
            <p>proxy simulation manager</p>
          </div>
        </div>
        <div class="topbar-meta">
          <div class="meta-chip"><span class="dot"></span>Live</div>
          <div class="meta-chip">HTTP &amp; WS</div>
          <div class="meta-chip">Break / Fix</div>
          <button type="button" id="themeToggle" class="theme-toggle" aria-label="Switch to light mode" title="Switch to light mode">
            <span class="theme-icon theme-icon-sun">☀</span>
            <span class="theme-icon theme-icon-moon">🌙</span>
          </button>
        </div>
      </div>

      <!-- ─── Create Simulation ───────────────────────────────── -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-label">
            <div class="panel-label-icon">
              <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </div>
            <h3>Create Simulation</h3>
          </div>
          <button type="button" class="panel-toggle" data-panel-toggle="createPanelBody">Minimize</button>
        </div>
        <div id="createPanelBody" class="panel-body">
          <form id="simForm">
            <div class="field-name">
              <label for="name">Name</label>
              <input id="name" type="text" placeholder="my-eth-http-sim" />
            </div>

            <div class="field-simulate-url">
              <label for="simulateUrl">Live URL</label>
              <input id="simulateUrl" type="text" placeholder="https://rpc.example.com  or  wss://..." required />
            </div>

            <div class="field-url-type">
              <label for="urlType">Protocol</label>
              <select id="urlType" required>
                <option value="http">http</option>
                <option value="ws">ws</option>
              </select>
            </div>

            <div class="field-port">
              <label for="port">Port</label>
              <input id="port" type="number" min="1000" max="65535" required />
              <div class="hint">range: 1000–65535</div>
            </div>

            <div class="field-error-code">
              <label for="errorCode">Error Code</label>
              <input id="errorCode" type="number" min="1" value="500" />
            </div>

            <div class="field-error-message">
              <label for="errorMessage">Error Message</label>
              <input id="errorMessage" type="text" value="Service unavailable (simulated)" />
            </div>

            <div class="full form-actions">
              <button class="btn-secondary" id="suggestBtn" type="button">⚡ Suggest Port</button>
              <button class="btn-primary" type="submit">Deploy Simulation</button>
            </div>
          </form>
          <div id="formError"></div>
        </div>
      </div>

      <!-- ─── Running Simulations ─────────────────────────────── -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-label">
            <div class="panel-label-icon">
              <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            </div>
            <h3>Running Simulations</h3>
          </div>
          <button type="button" class="panel-toggle" data-panel-toggle="runningPanelBody">Minimize</button>
        </div>
        <!--
          panel-body-flush: no padding so table extends edge-to-edge.
          sim-table-scroll: scrolls internally after 10 rows.
        -->
        <div id="runningPanelBody" class="panel-body-flush">
          <div class="sim-table-scroll">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Type</th>
                  <th>Port</th>
                  <th>Simulated Endpoint</th>
                  <th>Live URL</th>
                  <th>State</th>
                  <th>PID</th>
                  <th>
                    <span class="show-toggle">
                      <input id="toggleAllTerminals" type="checkbox" title="Select/Unselect all terminals" />
                      Terminal
                    </span>
                  </th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="simRows"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ─── Terminal Views ──────────────────────────────────── -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-header-left">
            <div class="panel-label">
              <div class="panel-label-icon">
                <svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
              </div>
              <h3>Terminal Views</h3>
            </div>
            <!-- Height controls live in the panel HEADER, always visible -->
            <div class="terminal-size-controls">
              <button type="button" id="terminalHeightDec" title="Decrease terminal height">−</button>
              <span class="height-label">height</span>
              <span class="terminal-height-val" id="terminalHeightVal">210px</span>
              <button type="button" id="terminalHeightInc" title="Increase terminal height">+</button>
            </div>
          </div>
          <button type="button" class="panel-toggle" data-panel-toggle="terminalPanelBody">Minimize</button>
        </div>
        <div id="terminalPanelBody" class="panel-body">
          <div class="terminal-toolbar">
            <div><!-- left spacer --></div>
            <div class="layout-controls">
              <span>Grid</span>
              <button type="button" data-cols="1">1</button>
              <button type="button" data-cols="2">2</button>
              <button type="button" data-cols="3">3</button>
              <button type="button" data-cols="4">4</button>
            </div>
          </div>
          <!-- terminal-grid grows naturally — no max-height -->
          <div id="terminalDeck" class="terminal-grid"></div>
        </div>
      </div>

      <!-- ─── Footer ─────────────────────────────────────────── -->
      <p class="footer-note">
        <span>&copy; 2026</span>
        <span class="footer-sep">·</span>
        <a href="https://www.linkedin.com/in/jaykumar-gohil-298068183/" target="_blank" rel="noopener noreferrer">Gohil Jaykumar</a>
        <span class="footer-sep">·</span>
        <span>Built in India 🇮🇳</span>
      </p>
    </div>

    <script>
      const form               = document.getElementById("simForm");
      const rows               = document.getElementById("simRows");
      const formError          = document.getElementById("formError");
      const portInput          = document.getElementById("port");
      const nameInput          = document.getElementById("name");
      const suggestBtn         = document.getElementById("suggestBtn");
      const terminalDeck       = document.getElementById("terminalDeck");
      const toggleAllTerminals = document.getElementById("toggleAllTerminals");
      const terminalHeightDec  = document.getElementById("terminalHeightDec");
      const terminalHeightInc  = document.getElementById("terminalHeightInc");
      const terminalHeightVal  = document.getElementById("terminalHeightVal");
      const themeToggle        = document.getElementById("themeToggle");
      const panelToggles       = document.querySelectorAll("[data-panel-toggle]");
      const layoutButtons      = document.querySelectorAll(".layout-controls button[data-cols]");

      const params   = new URLSearchParams(window.location.search);
      const isAdmin  = params.get("role") === "admin";

      const userStorageKey                  = "proxy_sim_user_id";
      const nameCounterStorageKey           = "proxy_sim_name_counter";
      const terminalSelectionStorageKeyBase = "proxy_sim_checked_terminals";
      const terminalColsStorageKey          = "proxy_sim_terminal_cols";
      const panelStateStorageKey            = "proxy_sim_panel_state";
      const terminalHeightStorageKeyBase    = "proxy_sim_terminal_height";
      const themeStorageKey                 = "proxy_sim_theme";

      const checkedTerminalIds = [];
      const terminalBuffers    = new Map();
      const terminalLastSeenAt = new Map();
      const terminalStreamUp   = new Map();
      const terminalNeedsResync = new Set();
      const terminalResyncInFlight = new Set();
      let   simulationsById    = new Map();
      const TERMINAL_STALE_MS  = 35_000;

      /* ── User identity ──────────────────────────────────────── */
      function getOrCreateUserId() {
        if (isAdmin) return "admin";
        let existing = localStorage.getItem(userStorageKey);
        if (existing) return existing;
        existing = (window.crypto && window.crypto.randomUUID)
          ? window.crypto.randomUUID()
          : `user-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
        localStorage.setItem(userStorageKey, existing);
        return existing;
      }

      const userId = getOrCreateUserId();
      const terminalSelectionStorageKey =
        `${terminalSelectionStorageKeyBase}_${isAdmin ? "admin" : userId}`;
      const terminalHeightStorageKey =
        `${terminalHeightStorageKeyBase}_${isAdmin ? "admin" : userId}`;

      /* ── API helper ─────────────────────────────────────────── */
      async function api(path, options) {
        const url = new URL(path, window.location.origin);
        if (isAdmin) url.searchParams.set("role", "admin");
        const fetchOptions = options ? { ...options } : {};
        fetchOptions.headers = fetchOptions.headers ? { ...fetchOptions.headers } : {};
        if (!isAdmin) fetchOptions.headers["x-user-id"] = userId;
        const response = await fetch(url.toString(), fetchOptions);
        const body = await response.json().catch(() => ({}));
        if (!response.ok) throw body;
        return body;
      }

      /* ── Endpoint helper ────────────────────────────────────── */
      function getSimulatedEndpoint(sim) {
        const original = sim.endpoint || "";
        if (!original) return "";
        const secureProtocol = sim.urlType === "ws" ? "wss:" : "https:";
        try {
          const parsed = new URL(original);
          parsed.protocol = secureProtocol;
          return parsed.toString().replace(/\/$/, "");
        } catch {
          return original.replace(/^(http:|ws:)/i, secureProtocol).replace(/\/$/, "");
        }
      }

      /* ── Auto name counter ──────────────────────────────────── */
      function nextSimulationName() {
        const current = Number(localStorage.getItem(nameCounterStorageKey) || "0");
        const next    = Number.isFinite(current) ? current + 1 : 1;
        localStorage.setItem(nameCounterStorageKey, String(next));
        return `Simulation-${next}`;
      }

      /* ── Port suggestion ────────────────────────────────────── */
      async function applyDefaultPort(from = 1000) {
        const result = await api(`/api/ports/suggest?from=${from}`);
        portInput.value = result.suggested_port;
      }

      async function applyFormDefaults() {
        nameInput.value = nextSimulationName();
        await applyDefaultPort(1000);
      }

      /* ── Terminal layout columns ────────────────────────────── */
      function applyTheme(theme) {
        const normalized = theme === "light" ? "light" : "dark";
        document.documentElement.dataset.theme = normalized;
        if (!themeToggle) return;
        const next = normalized === "dark" ? "light" : "dark";
        themeToggle.setAttribute("aria-label", `Switch to ${next} mode`);
        themeToggle.title = `Switch to ${next} mode`;
      }

      function initTheme() {
        const saved = localStorage.getItem(themeStorageKey);
        if (saved === "dark" || saved === "light") {
          applyTheme(saved);
          return;
        }
        applyTheme("dark");
      }

      function toggleTheme() {
        const current = document.documentElement.dataset.theme === "light" ? "light" : "dark";
        const next = current === "dark" ? "light" : "dark";
        applyTheme(next);
        localStorage.setItem(themeStorageKey, next);
      }

      function setTerminalColumns(cols) {
        const value = [1, 2, 3, 4].includes(cols) ? cols : 2;
        document.documentElement.style.setProperty("--terminal-cols", String(value));
        for (const button of layoutButtons) {
          button.classList.toggle("is-active", Number(button.dataset.cols) === value);
        }
        localStorage.setItem(terminalColsStorageKey, String(value));
      }

      /* ── Terminal height (CSS var + display label) ──────────── */
      function setTerminalHeight(height) {
        const clamped = Math.max(120, Math.min(720, Number(height) || 210));
        document.documentElement.style.setProperty("--terminal-height", `${clamped}px`);
        // Update the readout label in the panel header
        if (terminalHeightVal) terminalHeightVal.textContent = `${clamped}px`;
        localStorage.setItem(terminalHeightStorageKey, String(clamped));
      }

      /* KEY FIX: after adjusting height, re-render the deck so
         any existing terminal-body elements pick up the new height
         (belt-and-suspenders alongside the CSS variable update).  */
      function adjustTerminalHeight(delta) {
        const current = Number(localStorage.getItem(terminalHeightStorageKey) || "210");
        setTerminalHeight(current + delta);
        renderTerminalDeck(); /* forces DOM re-creation with new height var */
      }

      /* ── Persistence helpers ────────────────────────────────── */
      function saveCheckedTerminalIds() {
        localStorage.setItem(terminalSelectionStorageKey, JSON.stringify(checkedTerminalIds));
      }

      function loadPanelState() {
        const raw = localStorage.getItem(panelStateStorageKey);
        if (!raw) return {};
        try {
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch { return {}; }
      }

      function savePanelState(state) {
        localStorage.setItem(panelStateStorageKey, JSON.stringify(state));
      }

      function loadCheckedTerminalIds() {
        const raw = localStorage.getItem(terminalSelectionStorageKey);
        if (!raw) return;
        try {
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return;
          checkedTerminalIds.splice(0, checkedTerminalIds.length, ...parsed.map(String));
        } catch { /* ignore */ }
      }

      function setTerminalStreamState(simId, isOnline) {
        const next = Boolean(isOnline);
        if (terminalStreamUp.get(simId) === next) return false;
        terminalStreamUp.set(simId, next);
        return true;
      }

      function markTerminalDisconnected(simId) {
        terminalNeedsResync.add(simId);
        terminalLastSeenAt.delete(simId);
        const entries = terminalBuffers.get(simId) || [];
        const hadLogs = entries.length > 0;
        if (hadLogs) terminalBuffers.set(simId, []);
        return setTerminalStreamState(simId, false) || hadLogs;
      }

      function markTerminalActivity(simId) {
        terminalLastSeenAt.set(simId, Date.now());
        return setTerminalStreamState(simId, true);
      }

      async function resyncTerminalIfNeeded(simId) {
        if (!terminalNeedsResync.has(simId)) return;
        if (!checkedTerminalIds.includes(simId)) {
          terminalNeedsResync.delete(simId);
          return;
        }
        if (terminalResyncInFlight.has(simId)) return;

        terminalResyncInFlight.add(simId);
        try {
          await refreshTerminal(simId);
          terminalNeedsResync.delete(simId);
        } finally {
          terminalResyncInFlight.delete(simId);
        }
      }

      function markAllCheckedTerminalsOffline() {
        let changed = false;
        for (const id of checkedTerminalIds) {
          if (markTerminalDisconnected(id)) changed = true;
        }
        if (changed) renderTerminalDeck();
      }

      function evaluateTerminalStreamHealth() {
        const now = Date.now();
        let changed = false;
        for (const id of checkedTerminalIds) {
          const lastSeen = terminalLastSeenAt.get(id) || 0;
          const online = Boolean(_sseSource) && now - lastSeen <= TERMINAL_STALE_MS;
          if (online) {
            if (setTerminalStreamState(id, true)) changed = true;
          } else if (markTerminalDisconnected(id)) {
            changed = true;
          }
        }
        if (changed) renderTerminalDeck();
      }

      /* ── Select-all checkbox state ──────────────────────────── */
      function updateSelectAllState() {
        const total = simulationsById.size;
        if (!total) {
          toggleAllTerminals.checked       = false;
          toggleAllTerminals.indeterminate = false;
          return;
        }
        let selected = 0;
        for (const id of simulationsById.keys()) {
          if (checkedTerminalIds.includes(id)) selected += 1;
        }
        toggleAllTerminals.checked       = selected === total;
        toggleAllTerminals.indeterminate = selected > 0 && selected < total;
      }

      /* ── State badge element ────────────────────────────────── */
      function stateBadge(state) {
        const el  = document.createElement("span");
        el.className = `state-badge state-${state}`;
        const pip = document.createElement("span");
        pip.className = "pip";
        el.appendChild(pip);
        el.appendChild(document.createTextNode(state));
        return el;
      }

      /* ── Render terminal deck ───────────────────────────────── */
      function renderTerminalDeck() {
        terminalDeck.innerHTML = "";

        if (!checkedTerminalIds.length) {
          const empty = document.createElement("div");
          empty.className   = "terminal-empty";
          empty.textContent = "enable terminal for a simulation to see its logs here";
          terminalDeck.appendChild(empty);
          return;
        }

        for (const simId of checkedTerminalIds) {
          const sim = simulationsById.get(simId);
          if (!sim) continue;

          const card = document.createElement("div");
          card.className = "terminal-card";

          /* ── Head ── */
          const head = document.createElement("div");
          head.className = "terminal-head";

          const titleWrap = document.createElement("div");
          titleWrap.className = "terminal-title-wrap";

          const dots = document.createElement("div");
          dots.className = "term-dots";
          /* ["term-dot-r","term-dot-y","term-dot-g"].forEach(c => {
            const d = document.createElement("span");
            d.className = `term-dot ${c}`;
            dots.appendChild(d);
          }); */

          const title = document.createElement("span");
          title.className   = "terminal-title";
          title.textContent = `${sim.id} · ${sim.name} · ${getSimulatedEndpoint(sim)}`;
          const streamDot = document.createElement("span");
          const isOnline = terminalStreamUp.get(simId) === true;
          streamDot.className = `terminal-stream-dot ${isOnline ? "is-online" : "is-offline"}`;
          streamDot.title = isOnline ? "streaming: connected" : "streaming: disconnected";

          titleWrap.appendChild(dots);
          titleWrap.appendChild(streamDot);
          titleWrap.appendChild(title);

          /* ── Action buttons in card header ── */
          const actionWrap = document.createElement("div");
          actionWrap.className = "terminal-actions";

          const copyBtn = document.createElement("button");
          copyBtn.className   = "btn-copy";
          copyBtn.textContent = "Copy";
          copyBtn.addEventListener("click", async () => {
            try { await navigator.clipboard.writeText(getSimulatedEndpoint(sim)); } catch { /* ignore */ }
          });

          const downBtn = document.createElement("button");
          downBtn.className   = "btn-down";
          downBtn.textContent = "Down";
          downBtn.addEventListener("click", async () => {
            try { await api(`/api/simulations/${sim.id}/down`, { method: "POST" }); await render(); } catch { /* ignore */ }
          });

          const upBtn = document.createElement("button");
          upBtn.className   = "btn-up";
          upBtn.textContent = "Up";
          upBtn.addEventListener("click", async () => {
            try { await api(`/api/simulations/${sim.id}/up`, { method: "POST" }); await render(); } catch { /* ignore */ }
          });

          const deleteBtn = document.createElement("button");
          deleteBtn.className   = "btn-delete";
          deleteBtn.textContent = "Delete";
          deleteBtn.addEventListener("click", async () => {
            try { await api(`/api/simulations/${sim.id}`, { method: "DELETE" }); await render(); } catch { /* ignore */ }
          });

          const clearBtn = document.createElement("button");
          clearBtn.className   = "terminal-clear";
          clearBtn.textContent = "clear";
          clearBtn.addEventListener("click", () => {
            terminalBuffers.set(simId, []);
            renderTerminalDeck();
          });

          const refreshBtn = document.createElement("button");
          refreshBtn.className = "terminal-refresh";
          refreshBtn.title     = "Refresh — reconnect log stream and replay backlog";
          refreshBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>`;
          refreshBtn.addEventListener("click", () => refreshTerminal(simId));

          actionWrap.appendChild(copyBtn);
          actionWrap.appendChild(downBtn);
          actionWrap.appendChild(upBtn);
          actionWrap.appendChild(deleteBtn);
          actionWrap.appendChild(clearBtn);
          actionWrap.appendChild(refreshBtn);
          head.appendChild(titleWrap);
          head.appendChild(actionWrap);

          /* ── Log body ── */
          const body = document.createElement("div");
          body.className = "terminal-body";

          const entries = terminalBuffers.get(simId) || [];
          for (const entry of entries) {
            const line = document.createElement("div");
            line.className   = `line line-${entry.stream}`;
            line.textContent = `[${entry.at}] [${entry.stream}] ${entry.line}`;
            body.appendChild(line);
          }
          requestAnimationFrame(() => { body.scrollTop = body.scrollHeight; });

          card.appendChild(head);
          card.appendChild(body);
          terminalDeck.appendChild(card);
        }
      }

      /* ── Add incoming SSE log line ──────────────────────────── */
      function addLog(entry) {
        if (!checkedTerminalIds.includes(entry.id)) return;
        markTerminalActivity(entry.id);
        const entries = terminalBuffers.get(entry.id) || [];
        entries.push(entry);
        if (entries.length > 300) entries.shift();
        terminalBuffers.set(entry.id, entries);
        renderTerminalDeck();
      }

      /* ── Generic action button factory ─────────────────────── */
      function actionButton(text, className, fn) {
        const btn = document.createElement("button");
        btn.textContent = text;
        if (className) btn.className = className;
        btn.onclick = fn;
        return btn;
      }

      /* ── Main render ────────────────────────────────────────── */
      async function render() {
        const checkedBeforeRender = checkedTerminalIds.join(",");
        const items = await api("/api/simulations");
        simulationsById = new Map(items.map(sim => [sim.id, sim]));
        rows.innerHTML = "";

        /* Prune removed simulations from checked list */
        for (let i = checkedTerminalIds.length - 1; i >= 0; i -= 1) {
          const id = checkedTerminalIds[i];
          if (!simulationsById.has(id)) {
            checkedTerminalIds.splice(i, 1);
            terminalBuffers.delete(id);
            terminalLastSeenAt.delete(id);
            terminalStreamUp.delete(id);
            terminalNeedsResync.delete(id);
            terminalResyncInFlight.delete(id);
          }
        }
        for (const id of checkedTerminalIds) {
          if (!terminalBuffers.has(id)) {
            const sim = simulationsById.get(id);
            if (sim) terminalBuffers.set(id, (sim.logs || []).slice(-300));
          }
          if (!terminalStreamUp.has(id)) terminalStreamUp.set(id, false);
        }
        saveCheckedTerminalIds();
        const checkedAfterRender = checkedTerminalIds.join(",");
        if (checkedAfterRender !== checkedBeforeRender) {
          syncSseSubscription();
        }

        /* Empty state row */
        if (!items.length) {
          const emptyRow = document.createElement("tr");
          emptyRow.className = "empty-row";
          emptyRow.innerHTML = `<td colspan="10">no simulations running — create one above</td>`;
          rows.appendChild(emptyRow);
        }

        for (const sim of items) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td class="mono">${sim.id}</td>
            <td>${sim.name}</td>
            <td class="mono">${sim.urlType}</td>
            <td class="mono">${sim.port}</td>
            <td class="mono url-cell" title="${getSimulatedEndpoint(sim)}">${getSimulatedEndpoint(sim)}</td>
            <td class="mono url-cell" title="${sim.simulateUrl}">${sim.simulateUrl.slice(0, 50)}</td>
            <td class="state-cell"></td>
            <td class="mono">${sim.pid ?? "—"}</td>
            <td class="show-cell"></td>
            <td class="actions"></td>
          `;

          tr.querySelector(".state-cell").appendChild(stateBadge(sim.state));

          const showCell   = tr.querySelector("td.show-cell");
          const actionCell = tr.querySelector("td.actions");

          const checkbox = document.createElement("input");
          checkbox.type  = "checkbox";
          checkbox.style.width       = "auto";
          checkbox.style.accentColor = "var(--accent)";
          checkbox.checked = checkedTerminalIds.includes(sim.id);
          checkbox.addEventListener("change", () => {
            if (checkbox.checked) {
              if (!checkedTerminalIds.includes(sim.id)) checkedTerminalIds.push(sim.id);
              if (!terminalBuffers.has(sim.id))
                terminalBuffers.set(sim.id, (sim.logs || []).slice(-300));
              if (!terminalStreamUp.has(sim.id)) terminalStreamUp.set(sim.id, false);
            } else {
              const idx = checkedTerminalIds.indexOf(sim.id);
              if (idx >= 0) checkedTerminalIds.splice(idx, 1);
              terminalBuffers.delete(sim.id);
              terminalLastSeenAt.delete(sim.id);
              terminalStreamUp.delete(sim.id);
              terminalNeedsResync.delete(sim.id);
              terminalResyncInFlight.delete(sim.id);
            }
            saveCheckedTerminalIds();
            updateSelectAllState();
            syncSseSubscription(); // req 6: resubscribe with new id set
            renderTerminalDeck();
          });
          showCell.appendChild(checkbox);

          actionCell.appendChild(actionButton("Copy", "copy", async () => {
            await navigator.clipboard.writeText(getSimulatedEndpoint(sim));
          }));
          actionCell.appendChild(actionButton("Down", "warn", async () => {
            await api(`/api/simulations/${sim.id}/down`, { method: "POST" }); render();
          }));
          actionCell.appendChild(actionButton("Up", "up-btn", async () => {
            await api(`/api/simulations/${sim.id}/up`, { method: "POST" }); render();
          }));
          actionCell.appendChild(actionButton("Delete", "alt", async () => {
            await api(`/api/simulations/${sim.id}`, { method: "DELETE" }); render();
          }));

          rows.appendChild(tr);
        }

        updateSelectAllState();
        renderTerminalDeck();
      }

      /* ── Form submit ────────────────────────────────────────── */
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        formError.textContent = "";
        const payload = {
          name:                  document.getElementById("name").value,
          url_type:              document.getElementById("urlType").value,
          port:                  Number(document.getElementById("port").value),
          simulate_url:          document.getElementById("simulateUrl").value,
          error_status_code:     Number(document.getElementById("errorCode").value || 500),
          error_response_message:document.getElementById("errorMessage").value,
        };
        try {
          const created = await api("/api/simulations", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (created && created.id && !checkedTerminalIds.includes(created.id))
            checkedTerminalIds.push(created.id);
          if (created && created.id && !terminalBuffers.has(created.id))
            terminalBuffers.set(created.id, (created.logs || []).slice(-300));
          saveCheckedTerminalIds();
          syncSseSubscription();
          await render();
          form.reset();
          document.getElementById("errorCode").value    = "500";
          document.getElementById("errorMessage").value = "Service unavailable (simulated)";
          await applyFormDefaults();
        } catch (err) {
          const suggested = err.suggested_port ? ` — try port ${err.suggested_port}` : "";
          formError.textContent = `⚠ ${err.error || "Failed to create simulation"}${suggested}`;
        }
      });

      /* ── Suggest port ───────────────────────────────────────── */
      suggestBtn.addEventListener("click", async () => {
        portInput.value = "";
        await applyDefaultPort(1000);
      });

      /* ── Select-all terminals ───────────────────────────────── */
      toggleAllTerminals.addEventListener("change", () => {
        if (toggleAllTerminals.checked) {
          for (const id of simulationsById.keys()) {
            if (!checkedTerminalIds.includes(id)) checkedTerminalIds.push(id);
            if (!terminalBuffers.has(id)) {
              const sim = simulationsById.get(id);
              terminalBuffers.set(id, (sim && sim.logs ? sim.logs : []).slice(-300));
            }
            if (!terminalStreamUp.has(id)) terminalStreamUp.set(id, false);
          }
        } else {
          for (const id of checkedTerminalIds) {
            terminalLastSeenAt.delete(id);
            terminalStreamUp.delete(id);
            terminalNeedsResync.delete(id);
            terminalResyncInFlight.delete(id);
          }
          checkedTerminalIds.splice(0, checkedTerminalIds.length);
          terminalBuffers.clear();
        }
        saveCheckedTerminalIds();
        updateSelectAllState();
        syncSseSubscription(); // req 6: resubscribe with new id set
        render();
      });

      /* ── Layout column buttons ──────────────────────────────── */
      for (const button of layoutButtons) {
        button.addEventListener("click", () => setTerminalColumns(Number(button.dataset.cols)));
      }

      /* ── Terminal height +/- ────────────────────────────────── */
      terminalHeightDec.addEventListener("click", () => adjustTerminalHeight(-30));
      terminalHeightInc.addEventListener("click", () => adjustTerminalHeight(30));
      if (themeToggle) themeToggle.addEventListener("click", toggleTheme);

      /* ── Panel collapse toggles ─────────────────────────────── */
      const panelState = loadPanelState();
      for (const toggle of panelToggles) {
        const panelBodyId = toggle.dataset.panelToggle;
        const panelBody   = document.getElementById(panelBodyId);
        if (!panelBody) continue;

        if (panelState[panelBodyId]) {
          panelBody.classList.add("is-collapsed");
          toggle.textContent = "Expand";
        } else {
          toggle.textContent = "Minimize";
        }

        toggle.addEventListener("click", () => {
          const collapsed    = panelBody.classList.toggle("is-collapsed");
          toggle.textContent = collapsed ? "Expand" : "Minimize";
          panelState[panelBodyId] = collapsed;
          savePanelState(panelState);
        });
      }

      /* ── Managed SSE log stream ─────────────────────────────
         • Connects only when ≥1 terminal is checked
         • Sends ?ids=... so backend only streams relevant logs
         • Auto-reconnects on error / stale (no message > 20s)
         • refreshTerminal(simId) reloads backlog only for that terminal
      ─────────────────────────────────────────────────────── */
      let   _sseSource       = null;
      let   _sseStaleTimer   = null;
      const SSE_STALE_MS     = 20_000; // reconnect if no event for 20s

      function _sseUrl(replayBacklog = true) {
        const url = new URL("/api/logs/stream", window.location.origin);
        if (isAdmin) url.searchParams.set("role", "admin");
        else         url.searchParams.set("user_id", encodeURIComponent(userId));
        if (checkedTerminalIds.length)
          url.searchParams.set("ids", checkedTerminalIds.join(","));
        url.searchParams.set("backlog", replayBacklog ? "50" : "0");
        return url.toString();
      }

      function _resetStaleTimer() {
        clearTimeout(_sseStaleTimer);
        _sseStaleTimer = setTimeout(() => {
          console.warn("[SSE] stale — reconnecting");
          _reconnectSse(/*clearVisible=*/true);
        }, SSE_STALE_MS);
      }

      function _clearStaleTimer() {
        clearTimeout(_sseStaleTimer);
        _sseStaleTimer = null;
      }

      function _closeSse() {
        _clearStaleTimer();
        if (_sseSource) {
          _sseSource.close();
          _sseSource = null;
        }
        markAllCheckedTerminalsOffline();
      }

      function _reconnectSse(clearVisibleBuffers = false, replayBacklog = true) {
        _closeSse();
        if (!checkedTerminalIds.length) return; // req 4/5: no terminals → stay off

        if (clearVisibleBuffers) {
          for (const id of checkedTerminalIds) terminalBuffers.set(id, []);
          renderTerminalDeck();
        }

        const src = new EventSource(_sseUrl(replayBacklog));
        _sseSource = src;
        markAllCheckedTerminalsOffline();
        _resetStaleTimer(); // start stale watchdog

        src.onmessage = (event) => {
          _resetStaleTimer(); // any message resets the watchdog
          let payload = null;
          try {
            payload = JSON.parse(event.data);
          } catch {
            return;
          }
          if (!payload || typeof payload !== "object") return;
          if (payload.type === "heartbeat") {
            const heartbeatIds = new Set(
              Array.isArray(payload.ids) ? payload.ids.map(String) : [],
            );
            let changed = false;
            for (const id of checkedTerminalIds) {
              const online = heartbeatIds.has(id);
              if (online) {
                terminalLastSeenAt.set(id, Date.now());
                if (setTerminalStreamState(id, true)) changed = true;
                resyncTerminalIfNeeded(id);
              } else if (markTerminalDisconnected(id)) {
                changed = true;
              }
            }
            if (changed) renderTerminalDeck();
            return;
          }
          addLog(payload);
        };

        src.onerror = () => {
          // Browser will retry; we just mark as stale and do our own reconnect
          console.warn("[SSE] error event — will reconnect");
          _closeSse();
          // Delay a bit before reconnecting to avoid tight loops
          setTimeout(() => _reconnectSse(true), 2000);
        };
      }

      /* Call this whenever checkedTerminalIds changes */
      function syncSseSubscription() {
        if (!checkedTerminalIds.length) {
          _closeSse(); // req 5: disconnect when nothing is checked
          return;
        }
        // Resubscribe with new id set without replaying backlog to avoid duplicates
        _reconnectSse(false, false);
      }

      /* Refresh a single terminal without touching other terminal buffers */
      async function refreshTerminal(simId) {
        terminalBuffers.set(simId, []);
        renderTerminalDeck();
        try {
          const result = await api(`/api/simulations/${simId}/logs`);
          terminalBuffers.set(simId, (result.logs || []).slice(-300));
          terminalNeedsResync.delete(simId);
          renderTerminalDeck();
        } catch (error) {
          console.warn(`[Terminal] failed to refresh ${simId}`, error);
        }
      }

      /* ── Bootstrap ──────────────────────────────────────────── */
      const savedCols   = Number(localStorage.getItem(terminalColsStorageKey) || "2");
      const savedHeight = Number(localStorage.getItem(terminalHeightStorageKey) || "210");

      initTheme();
      setTerminalColumns(savedCols);
      setTerminalHeight(savedHeight);   /* also updates the readout label */
      loadCheckedTerminalIds();
      applyFormDefaults();
      render();
      syncSseSubscription(); // start SSE only if terminals are already checked
      setInterval(evaluateTerminalStreamHealth, 5000);
      setInterval(render, 3000);
    </script>
  </body>
</html>
